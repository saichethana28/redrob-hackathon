# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini strictly for architectural blueprinting, strategy formulation, and Python script optimization (e.g., NumPy matrix multiplication and Streamlit/Gradio UI code). Absolutely no candidate data or JSONL payloads were fed into any LLM. All semantic embeddings and data evaluations were performed locally on my machine.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-Stage Asymmetric Pipeline. To strictly adhere to the 5-minute CPU constraint while achieving deep semantic matching, our architecture splits execution. 
  
  Phase 1 (Offline Pre-computation): Parses the JD and candidates. Evaluates profiles against a strict programmatic honeypot engine (trapping chronological paradoxes and dropping non-engineering titles with keyword-stuffed AI skills). Extracts dense semantic vectors using a local sentence-transformers model (all-MiniLM-L6-v2) and computes a 0.0-1.0 behavioral multiplier based on engagement signals. Saves this state to `artifacts.pkl`.
  
  Phase 2 (Online Ranking): Runs in < 1 second on CPU with 0 network. Loads artifacts, executes pure NumPy matrix multiplication for cosine similarity, zeroes out trapped honeypots, applies a deterministic tuple sort (-score, candidate_id) to guarantee auto-grader compliance, and generates custom, non-hallucinated reasoning strings.

